<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <!-- CSP for static hosts (e.g. GitHub Pages) that cannot set response headers.
         This is what enforces applet isolation: connect-src 'none' blocks all
         network from the launcher AND its blob worker (the applet), worker-src
         blob: allows only the inline classic worker. A header-based CSP (dev
         server) is stricter still and composes with this. frame-ancestors is
         header-only and omitted here. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' blob:; connect-src 'none'; worker-src blob:; child-src blob:; style-src 'unsafe-inline'; img-src data: blob:; font-src 'none'; media-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>Trusted applet launcher</title>
  </head>
  <body>
    <script type="module" src="/src/sandbox/frame.ts"></script>
  </body>
</html>
