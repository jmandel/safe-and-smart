name: Deploy demo to GitHub Pages

# Builds the single-origin (Pages) variant with Bun and publishes it. Isolation on
# Pages comes from the opaque sandbox iframe + the <meta> CSP in sandbox.html
# (Pages cannot set response headers); see docs/DEPLOYMENT.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Build single-origin Pages variant (base = /<repo>/)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_SANDBOX_ORIGIN: self
        run: bun run build.ts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
